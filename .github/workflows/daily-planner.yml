name: Daily Planner

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - run: |
          mkdir -p daily
          FILE="daily/${DATE}.md"

          if [ ! -f "$FILE" ]; then
            echo "# Daily Planner - ${DATE}" > "$FILE"
            echo "" >> "$FILE"
            echo "## Goals" >> "$FILE"
            echo "- " >> "$FILE"
            echo "" >> "$FILE"
            echo "## Tasks" >> "$FILE"
            echo "- " >> "$FILE"
            echo "" >> "$FILE"
            echo "## Notes" >> "$FILE"
            echo "- " >> "$FILE"
          fi

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add daily/

          git diff --cached --quiet || git commit -m "Daily planner update ${DATE}"

          git push
