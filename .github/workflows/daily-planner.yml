name: Daily Planner

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Create daily file if not exists
        run: |
          mkdir -p daily
          FILE="daily/${DATE}.md"

          if [ ! -f "$FILE" ]; then
            cat << 'EOF' > "$FILE"
# Daily Planner - ${DATE}

## Goals


## Tasks


## Notes

            EOF
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add daily/

          git diff --cached --quiet || git commit -m "Daily planner update ${DATE}"

          git push
